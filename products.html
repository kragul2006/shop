<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Products — Sri Lakshmi Multi Shop</title>
<link rel="stylesheet" href="css/style.css">
<style>
.products-layout { display: grid; grid-template-columns: 260px 1fr; gap: 32px; padding: 40px 0; }
.sidebar { position: sticky; top: calc(var(--nav-h) + 20px); height: fit-content; }
.filter-section { background: white; border: 1px solid var(--border); border-radius: 6px; padding: 22px; margin-bottom: 16px; }
.filter-section h4 { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--crimson); margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.filter-cat-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 10px; border-radius: 4px; cursor: pointer;
  font-size: 13px; color: var(--text-mid); transition: all 0.15s; margin-bottom: 2px;
  border: none; background: none; width: 100%; text-align: left; font-family: var(--font-body);
}
.filter-cat-item:hover { background: var(--cream-warm); color: var(--crimson); }
.filter-cat-item.active { background: var(--crimson); color: white; font-weight: 700; }
.filter-cat-item .count { font-size: 11px; opacity: 0.65; }
.price-track { position: relative; height: 4px; background: var(--border); border-radius: 2px; margin: 20px 0 10px; }
.price-fill { position: absolute; left: 0; right: 0; height: 100%; background: var(--crimson); border-radius: 2px; }
.filter-sort-item {
  display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 4px;
  cursor: pointer; font-size: 13px; color: var(--text-mid); transition: all 0.15s; margin-bottom: 2px; border: none; background: none; width: 100%; text-align: left; font-family: var(--font-body);
}
.filter-sort-item:hover { background: var(--cream-warm); color: var(--crimson); }
.filter-sort-item.active { background: var(--cream-warm); color: var(--crimson); font-weight: 700; }
.filter-sort-item .radio { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--border-mid); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.filter-sort-item.active .radio { border-color: var(--crimson); }
.filter-sort-item.active .radio::after { content: ''; width: 8px; height: 8px; background: var(--crimson); border-radius: 50%; }
.products-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: gap; }
.products-header .result-count { font-size: 13px; color: var(--text-muted); }
/* Top sticky sort bar shown at page start */
.top-sort-bar { position: sticky; top: calc(var(--nav-h) + 8px); z-index: 90; background: white; padding: 8px 0; border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: center; overflow-x: auto; }
.top-sort-bar .filter-sort-item { display: inline-flex; flex: 0 0 auto; margin-right: 6px; }
.search-bar { position: relative; margin-bottom: 20px; }
.search-bar input { padding-left: 42px; }
.search-bar svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
.product-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(210px,1fr)); gap: 20px; }
.empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); }
.empty-state .empty-icon { font-size: 52px; margin-bottom: 16px; }
.empty-state h3 { font-family: var(--font-display); font-size: 24px; color: var(--text-dark); margin-bottom: 10px; }
.active-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.active-chip {
  display: flex; align-items: center; gap: 6px; padding: 5px 12px;
  background: var(--cream-warm); border: 1px solid var(--border-mid);
  border-radius: 20px; font-size: 12px; color: var(--text-mid);
}
.active-chip button { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 14px; line-height: 1; padding: 0; }
.active-chip button:hover { color: var(--crimson); }
@media (max-width: 860px) {
  .products-layout { grid-template-columns: 1fr; }
  .sidebar { position: static; }
}
</style>
</head>
<body>
<div id="nav-container"></div>

<div class="page-header">
  <div class="page-header-inner">
    <h1>Our Collection</h1>
    <p>Handpicked products for every tradition and occasion</p>
  </div>
</div>

<div class="breadcrumb">
  <div class="breadcrumb-inner">
    <a href="index.html">Home</a> / Products
  </div>
</div>

<div class="container">
  <div class="products-layout">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="filter-section">
        <h4>Category</h4>
        <div id="catFilters"></div>
      </div>
      <div class="filter-section">
        <h4>Price Range</h4>
        <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-muted);margin-bottom:12px">
          <span>₹500</span><span id="maxPriceLabel">₹1,000</span>
        </div>
        <input type="range" id="priceRange" min="500" max="1000" step="1000" value="1000" style="width:100%;accent-color:var(--crimson)">
      </div>
      <div class="filter-section">
        <h4>Sort By</h4>
        <div id="sortFilters"></div>
      </div>
      <button onclick="clearAll()" class="btn btn-outline btn-md" style="width:100%">Clear All Filters</button>
    </aside>

    <!-- MAIN -->
    <main>
      <div class="search-bar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="form-input" id="searchInput" placeholder="Search products, categories…" oninput="applyFilters()">
      </div>
      <div class="active-chips" id="activeChips"></div>
      <div class="products-header">
        <span class="result-count" id="resultCount"></span>
      </div>
      <div id="topSort" class="top-sort-bar" aria-hidden="false"></div>
      <div class="product-grid" id="productGrid"></div>
    </main>
  </div>
</div>

<div id="footer-container"></div>
<button id="scrollTop" aria-label="Scroll to top">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5,12 12,5 19,12"/></svg>
</button>
<div class="toast" id="toast"></div>
<script src="js/app.js"></script>
<script>
document.getElementById('nav-container').innerHTML = renderNavbar('products');
document.getElementById('footer-container').innerHTML = renderFooter();
initNavbar();

const SORTS = [
  {key:'default',label:'Default'},
  {key:'price-asc',label:'Price: Low to High'},
  {key:'price-desc',label:'Price: High to Low'},
  {key:'featured',label:'Featured First'},
  {key:'new',label:'Newest First'},
];

let activeCat = 'All';
let activeSort = 'default';
let maxPrice = 1000;
let searchQ = '';

// Read URL param for cat
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('cat')) activeCat = urlParams.get('cat');

const products = Store.getAll();

// Render sidebar categories
function renderCatFilters() {
  const el = document.getElementById('catFilters');
  el.innerHTML = CATEGORIES.map(c => {
    const count = c==='All' ? products.length : products.filter(p=>p.category===c).length;
    return `<button class="filter-cat-item${activeCat===c?' active':''}" onclick="setCat('${c}')">
      <span>${c}</span><span class="count">${count}</span>
    </button>`;
  }).join('');
}

function renderSortFilters() {
  const html = SORTS.map(s=>`
    <button class="filter-sort-item${activeSort===s.key?' active':''}" onclick="setSort('${s.key}')">
      <span class="radio"></span>${s.label}
    </button>`).join('');
  const el = document.getElementById('sortFilters'); if (el) el.innerHTML = html;
  const top = document.getElementById('topSort'); if (top) top.innerHTML = html;
}

function setCat(c) { activeCat=c; renderCatFilters(); applyFilters(); }
function setSort(s) { activeSort=s; renderSortFilters(); applyFilters(); }
function clearAll() { activeCat='All'; activeSort='default'; maxPrice=1000; searchQ=''; document.getElementById('priceRange').value=1000; document.getElementById('maxPriceLabel').textContent='₹1,000'; document.getElementById('searchInput').value=''; renderCatFilters(); renderSortFilters(); applyFilters(); }

// Price range
document.getElementById('priceRange').addEventListener('input', function(){
  maxPrice = +this.value;
  document.getElementById('maxPriceLabel').textContent = '₹'+maxPrice.toLocaleString();
  applyFilters();
});

function applyFilters() {
  searchQ = document.getElementById('searchInput').value.toLowerCase();
  let filtered = products.filter(p => {
    const fp = Math.round(p.price*(1-p.discount/100));
    const matchCat = activeCat==='All'||p.category===activeCat;
    const matchPrice = fp<=maxPrice;
    const matchQ = !searchQ||p.name.toLowerCase().includes(searchQ)||p.category.toLowerCase().includes(searchQ)||p.description.toLowerCase().includes(searchQ);
    return matchCat&&matchPrice&&matchQ;
  });
  if(activeSort==='price-asc') filtered.sort((a,b)=>(a.price*(1-a.discount/100))-(b.price*(1-b.discount/100)));
  if(activeSort==='price-desc') filtered.sort((a,b)=>(b.price*(1-b.discount/100))-(a.price*(1-a.discount/100)));
  if(activeSort==='featured') filtered.sort((a,b)=>b.featured-a.featured);
  if(activeSort==='new') filtered.sort((a,b)=>b.isNew-a.isNew);

  document.getElementById('resultCount').textContent = `${filtered.length} product${filtered.length!==1?'s':''} found`;

  // Ensure sort filters are visible at top: make products header sticky
  const header = document.querySelector('.products-header');
  if (header) header.style.position = 'sticky', header.style.top = 'calc(var(--nav-h) + 8px)', header.style.zIndex = 50, header.style.background = 'white', header.style.padding = '8px 0';

  // Active chips
  const chips = [];
  if(activeCat!=='All') chips.push(`<div class="active-chip">${activeCat}<button onclick="setCat('All')">✕</button></div>`);
  if(activeSort!=='default') chips.push(`<div class="active-chip">${SORTS.find(s=>s.key===activeSort)?.label}<button onclick="setSort('default')">✕</button></div>`);
  if(maxPrice<1000) chips.push(`<div class="active-chip">Under ₹${maxPrice.toLocaleString()}<button onclick="()=>{maxPrice=1000;document.getElementById('priceRange').value=1000;document.getElementById('maxPriceLabel').textContent='₹1,000';applyFilters()}">✕</button></div>`);
  if(searchQ) chips.push(`<div class="active-chip">"${searchQ}"<button onclick="document.getElementById('searchInput').value='';searchQ='';applyFilters()">✕</button></div>`);
  document.getElementById('activeChips').innerHTML = chips.join('');

  // Product grid
  const grid = document.getElementById('productGrid');
  if(filtered.length===0) {
    grid.innerHTML = '';
    grid.insertAdjacentHTML('beforebegin', `<div class="empty-state"><div class="empty-icon">🔍</div><h3>No products found</h3><p>Try adjusting your filters or search term.</p><button class="btn btn-outline btn-md" style="margin-top:20px" onclick="clearAll()">Clear Filters</button></div>`);
    return;
  }
  document.querySelectorAll('.empty-state').forEach(e=>e.remove());

  grid.innerHTML = filtered.map(p=>{
    const fp = Math.round(p.price*(1-p.discount/100));
    const avgR = p.reviews.length ? Math.round(p.reviews.reduce((s,r)=>s+r.rating,0)/p.reviews.length) : 0;
    return `<a href="product.html?id=${p.id}" class="product-card">
      <div class="product-card-img">
        ${productSVG((p.images && p.images[0]) || p.image,p.colors[0],130)}
        <div class="badge-stack">
          ${p.isNew?`<span class="badge badge-new">New</span>`:''}
          ${p.featured?`<span class="badge badge-featured">Featured</span>`:''}
          ${p.discount>0?`<span class="badge badge-sale">${p.discount}% off</span>`:''}
        </div>
      </div>
      <div class="product-card-body">
        <div class="product-cat">${p.category}</div>
        <div class="product-name">${p.name}</div>
        ${p.reviews.length?`<div class="stars mb-8">${starsHTML(avgR)} <span style="font-size:11px;color:var(--text-muted);margin-left:4px">(${p.reviews.length})</span></div>`:''}
        <div class="product-price-row">
          <span class="product-price">₹${fp.toLocaleString()}</span>
          ${p.discount>0?`<span class="product-original">₹${p.price.toLocaleString()}</span>`:''}
        </div>
        <div class="product-colors">${p.colors.map(c=>`<div class="product-swatch" style="background:${c}" title="${typeof colorName==='function'?colorName(c):c}" aria-label="${typeof colorName==='function'?colorName(c):c}"></div>`).join('')}</div>
      </div>
    </a>`;
  }).join('');
}

renderCatFilters();
renderSortFilters();
applyFilters();
</script>
</body>
</html>
