<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Product — Sri Lakshmi Multi Shop</title>
<link rel="stylesheet" href="css/style.css">
<style>
.product-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 56px; padding: 44px 0; align-items: start; }
.product-gallery { position: sticky; top: calc(var(--nav-h) + 20px); }
.product-main-img {
  background: var(--cream); border: 1px solid var(--border); border-radius: 6px;
  height: 440px; display: flex; align-items: center; justify-content: center; overflow: hidden;
  margin-bottom: 14px; transition: background 0.3s;
}
/* Ensure images fill their boxes and are cropped appropriately */
.product-main-img, .product-thumb, .product-card-img { overflow: hidden; }
.product-main-img img, .product-card-img img, .product-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.product-thumbs { display: flex; gap: 10px; }
.product-thumb {
  width: 72px; height: 72px; border-radius: 4px; border: 2px solid var(--border);
  background: var(--cream); display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s; flex-shrink: 0;
}
.product-thumb { overflow: hidden; }
.product-thumb.active { border-color: var(--crimson); }
.product-thumb:hover { border-color: var(--crimson); }

/* Info */
.product-cat-tag { font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--crimson); font-weight: 700; margin-bottom: 10px; }
.product-title { font-family: var(--font-display); font-size: clamp(22px,3vw,34px); font-weight: 700; color: var(--text-dark); line-height: 1.2; margin-bottom: 16px; }
.rating-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
.rating-avg { font-weight: 700; font-size: 16px; }
.rating-count { font-size: 13px; color: var(--text-muted); }
.price-section { margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
.price-main { font-family: var(--font-display); font-size: 36px; color: var(--crimson); font-weight: 700; }
.price-original { font-size: 18px; color: var(--text-muted); text-decoration: line-through; margin-left: 10px; }
.price-save { display: inline-block; background: #2d7a2d; color: white; font-size: 12px; font-weight: 700; padding: 3px 9px; border-radius: 2px; margin-left: 10px; vertical-align: middle; }
.product-desc { font-size: 14px; color: var(--text-muted); line-height: 1.85; margin-bottom: 26px; }
.select-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-mid); margin-bottom: 10px; }
.select-label span { color: var(--crimson); }
.variant-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 22px; }
.color-row { display: flex; gap: 10px; margin-bottom: 22px; }
.qty-section { margin-bottom: 26px; }
.qty-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-mid); margin-bottom: 10px; }
.qty-label .stock { color: #2d7a2d; font-style: normal; font-weight: 400; text-transform: none; letter-spacing: 0; font-size: 12px; margin-left: 10px; }
.action-row { display: flex; gap: 12px; margin-bottom: 24px; }
.action-row .btn-cart { flex: 1; }
.action-row .btn-wish { width: 48px; height: 48px; border-radius: 4px; padding: 0; flex-shrink: 0; }
.trust-badges { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; padding-top: 22px; border-top: 1px solid var(--border); }
.trust-badge { text-align: center; padding: 12px 8px; border-radius: 4px; background: var(--cream); }
.trust-badge .t-icon { font-size: 22px; margin-bottom: 5px; }
.trust-badge .t-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dark); }
.trust-badge .t-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

.related-section { padding: 48px 0; border-top: 1px solid var(--border); }

@media(max-width:800px){
  .product-layout { grid-template-columns: 1fr; gap: 28px; }
  .product-gallery { position: static; }
  .product-main-img { height: 300px; }
}
</style>
</head>
<body>
<div id="nav-container"></div>

<div class="breadcrumb">
  <div class="breadcrumb-inner" id="breadcrumb">
    <a href="index.html">Home</a> / <a href="products.html">Products</a> / …
  </div>
</div>

<div class="container">
  <div id="productDetail"></div>
</div>

<div id="footer-container"></div>
<button id="scrollTop" aria-label="Scroll to top">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5,12 12,5 19,12"/></svg>
</button>
<div class="toast" id="toast"></div>
<script src="js/app.js"></script>
<script>
document.getElementById('nav-container').innerHTML = renderNavbar('products');
document.getElementById('footer-container').innerHTML = renderFooter();
initNavbar();

const params = new URLSearchParams(window.location.search);
const productId = +params.get('id');
const editMode = params.get('edit')==='1' || params.get('admin')==='1';
const allProducts = Store.getAll();
let product = allProducts.find(p=>p.id===productId);

if (!product) {
  document.getElementById('productDetail').innerHTML = `<div style="text-align:center;padding:80px 20px"><div style="font-size:52px;margin-bottom:16px">😔</div><h2 style="font-family:var(--font-display);font-size:28px;margin-bottom:12px">Product not found</h2><a href="products.html" class="btn btn-primary btn-md" style="margin-top:16px">Back to Products</a></div>`;
} else {
  let selColor = product.colors[0];
  let selVariant = product.variants[0];
  let qty = 1;

  // Breadcrumb
  document.getElementById('breadcrumb').innerHTML = `<a href="index.html">Home</a> / <a href="products.html">Products</a> / <a href="products.html?cat=${encodeURIComponent(product.category)}">${product.category}</a> / ${product.name}`;
  document.title = `${product.name} — Sri Lakshmi Multi Shop`;

  function finalPrice() { return Math.round(product.price*(1-product.discount/100)); }

  function renderAll() {
    const fp = finalPrice();

    document.getElementById('productDetail').innerHTML = `
    <div class="product-layout">
      <!-- GALLERY -->
      <div class="product-gallery">
        <div class="product-main-img" id="mainImg">
          ${productSVG(product.image, selColor, 280)}
        </div>
        <div class="product-thumbs" id="thumbs">
          ${product.colors.map((c,i)=>`
            <div class="product-thumb${selColor===c?' active':''}" onclick="pickColor('${c}')">
              ${productSVG(product.image,c,52)}
            </div>`).join('')}
        </div>
      </div>

      <!-- INFO -->
      <div class="product-info">
        <div class="product-cat-tag">${product.category}</div>
        <h1 class="product-title">${product.name}</h1>

        

        <div class="price-section">
          <span class="price-main">₹${fp.toLocaleString()}</span>
          ${product.discount>0?`<span class="price-original">₹${product.price.toLocaleString()}</span><span class="price-save">${product.discount}% OFF</span>`:''}
        </div>

        <p class="product-desc">${product.description}</p>

        <!-- COLOUR -->
        <div class="select-label">Colour: <span>${selColor}</span></div>
        <div class="color-row">
          ${product.colors.map(c=>`
            <div class="color-swatch${selColor===c?' active':''}" style="background:${c}" onclick="pickColor('${c}')" title="${c}"></div>
          `).join('')}
        </div>

        <!-- VARIANT -->
        <div class="select-label">Variant: <span>${selVariant}</span></div>
        <div class="variant-row">
          ${product.variants.map(v=>`
            <button class="variant-btn${selVariant===v?' active':''}" onclick="pickVariant('${v}')">${v}</button>
          `).join('')}
        </div>

        <!-- QTY -->
        <div class="qty-section">
          <div class="qty-label">Quantity <em class="stock">✓ ${product.stock} in stock</em></div>
          <div class="qty-wrap">
            <button class="qty-btn" onclick="changeQty(-1)">−</button>
            <div class="qty-num" id="qtyNum">${qty}</div>
            <button class="qty-btn" onclick="changeQty(1)">+</button>
          </div>
        </div>

        
        <!-- TRUST BADGES -->
        <div class="trust-badges">
          <div class="trust-badge"><div class="t-icon">🔒</div><div class="t-title">Secure Checkout</div><div class="t-sub">Encrypted payments and safe ordering</div></div>
          <div class="trust-badge"><div class="t-icon">🔄</div><div class="t-title">Easy Returns</div><div class="t-sub">7-day policy</div></div>
          <div class="trust-badge"><div class="t-icon">✅</div><div class="t-title">Verified Quality</div><div class="t-sub">Inspected stock</div></div>
        </div>
        
        ${editMode?`<div style="margin-top:18px">
          <input id="imageFileInput" type="file" accept="image/*" style="display:none" onchange="handleImageFile(event)">
          <button class="btn btn-outline btn-md" onclick="document.getElementById('imageFileInput').click()">Upload Image</button>
          <button class="btn btn-outline btn-md" style="margin-left:8px;background:#fff;color:#8B0000;border-color:#8B0000" onclick="removeProductImage()">Remove Image</button>
        </div>`:''}
      </div>
    </div>



    <!-- RELATED -->
    <div class="related-section">
      <div class="section-title" style="margin-bottom:32px">
        <h2 style="font-size:26px">You May Also Like</h2>
      </div>
      <div class="grid-auto-4">
        ${allProducts.filter(p=>p.id!==product.id&&p.category===product.category).slice(0,4).map(p=>{
          const rfp=Math.round(p.price*(1-p.discount/100));
          return `<a href="product.html?id=${p.id}" class="product-card">
            <div class="product-card-img" style="height:160px">${productSVG(p.image,p.colors[0],110)}</div>
            <div class="product-card-body">
              <div class="product-name" style="font-size:14px">${p.name}</div>
              <div class="product-price-row"><span class="product-price" style="font-size:16px">₹${rfp.toLocaleString()}</span></div>
            </div>
          </a>`;
        }).join('')}
      </div>
    </div>`;
  }

  function pickColor(c) { selColor=c; renderAll(); }
  function pickVariant(v) { selVariant=v; renderAll(); }
  function changeQty(d) { qty=Math.max(1,Math.min(product.stock,qty+d)); document.getElementById('qtyNum').textContent=qty; }
  function toggleWish(btn) { btn.textContent=btn.textContent==='♡'?'♥':'♡'; showToast(btn.textContent==='♥'?'Added to wishlist!':'Removed from wishlist'); }

  window.pickColor=pickColor;
  window.pickVariant=pickVariant;
  window.changeQty=changeQty;
  window.toggleWish=toggleWish;

  function handleImageFile(e) {
    const file = e.target && e.target.files && e.target.files[0];
    if (!file) return;
    // limit size to 6MB to avoid excessive localStorage usage
    if (file.size > 6 * 1024 * 1024) { showToast('Image too large (max 6MB)'); return; }
    const reader = new FileReader();
    reader.onload = function(ev) {
      product.image = ev.target.result;
      const idx = allProducts.findIndex(p=>p.id===product.id);
      if (idx >= 0) {
        allProducts[idx].image = product.image;
        try { Store.save(allProducts); } catch(err) { console.warn(err); }
      }
      showToast('Product image updated');
      renderAll();
    };
    reader.readAsDataURL(file);
  }

  function removeProductImage() {
    if (!confirm('Remove custom image and revert to placeholder?')) return;
    product.image = '';
    const idx = allProducts.findIndex(p=>p.id===product.id);
    if (idx >= 0) {
      allProducts[idx].image = product.image;
      try { Store.save(allProducts); } catch(err) { console.warn(err); }
    }
    showToast('Image removed');
    renderAll();
  }

  window.handleImageFile = handleImageFile;
  window.removeProductImage = removeProductImage;

  renderAll();
}
</script>
</body>
</html>
